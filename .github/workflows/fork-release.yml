name: Fork Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
    workflow_run:
        workflows:
            - Sync Custom Plugin
        types:
            - completed

permissions:
    contents: write

concurrency:
    group: fork-release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    release:
        if: github.repository == '956zs/Equicord' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build desktop
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect release files
              run: |
                  cd dist
                  rm -rf release
                  mkdir release

                  cp browser/browser.* release
                  cp Equicord.user.{js,js.LEGAL.txt} release
                  cp *.{json,zip,asar} release

                  cp desktop/* release
                  for file in equibop/*; do
                    filename=$(basename "$file")
                    cp "$file" "release/equibop${filename^}"
                  done

                  find release -size 0 -delete
                  rm -f release/package.json
                  rm -f release/*.map

            - name: Create or update rolling release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release view latest >/dev/null 2>&1 || gh release create latest --title "latest" --notes "Rolling custom Equicord build with CustomVerticalWriter."
                  gh release upload latest --clobber dist/release/*
