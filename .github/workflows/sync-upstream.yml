name: Sync Upstream

on:
    workflow_dispatch:
    schedule:
        - cron: "0 */6 * * *"

permissions:
    contents: write

concurrency:
    group: sync-upstream
    cancel-in-progress: false

jobs:
    sync:
        name: Merge upstream/main into fork
        runs-on: ubuntu-latest

        env:
            TARGET_BRANCH: ${{ github.event.repository.default_branch }}
            UPSTREAM_REPO: https://github.com/Equicord/Equicord.git
            UPSTREAM_BRANCH: main

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.repository.default_branch }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Fetch upstream
              run: |
                  git remote remove upstream 2>/dev/null || true
                  git remote add upstream "$UPSTREAM_REPO"
                  git fetch upstream "$UPSTREAM_BRANCH" --no-tags

            - name: Merge upstream into target branch
              run: |
                  git checkout "$TARGET_BRANCH"

                  if git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" HEAD; then
                    echo "Already up to date."
                    exit 0
                  fi

                  git merge --no-edit "upstream/$UPSTREAM_BRANCH"

            - name: Push merged branch
              run: git push origin "HEAD:$TARGET_BRANCH"
